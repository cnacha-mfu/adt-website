        - paragraph
        - list [ref=e123]:
          - listitem [ref=e124]: "PLO1: ซื่อสัตย์ ปฎิบัติตามหลักจริยธรรมวิจัยพื้นฐานและจริยธรรมวิจัยในมนุษย์ในการสร้างงานวิจัยและนวัตกรรม"
          - listitem [ref=e125]: "PLO2: อภิปรายเชื่อมโยงสาระที่สำคัญของเทคโนโลยีพลิกผันด้าน Edge Computing, Ubiquitous Artificial Intelligence และ Modern Communication Platform กับศาสตร์อื่นที่เกี่ยวข้อง กับการพัฒนางานวิจัยและนวัตกรรม"
          - listitem [ref=e126]: "PLO3: วิเคราะห์ศักยภาพ คัดเลือก และบูรณาการความรู้เทคโนโลยีพลิกผัน ด้าน Edge Computing, Ubiquitous Artificial Intelligence และ Modern Communication Platform ร่วมกับศาสตร์ต่าง ๆ ที่เกี่ยวข้องในการออกแบบงานวิจัยและนวัตกรรม"
          - listitem [ref=e127]: "PLO4: ตระหนักเกี่ยวกับโลก มีทัศนคติเชิงบวกต่อภาวะพลิกผัน มีความคิดริเริ่ม พัฒนาตัวเองอย่างต่อเนื่อง และปฏิบัติงานร่วมกับผู้อื่นภายใต้สังคมพหุวัฒนธรรมที่สอดคล้องกับการเปลี่ยนแปลงจากภาวะพลิกผัน"
          - listitem [ref=e128]: "PLO5: คัดเลือก วิธีการนำเสนอและถ่ายทอดความรู้ เครื่องมือทางคณิตศาสตร์ สถิติ และเทคโนโลยีสารสนเทศเพื่อสนับสนุนการวิจัย"
          - listitem [ref=e129]: "PLO6: มีความสามารถในการพัฒนางานวิจัยและนวัตกรรมต้นแบบ โดยการบูรณาการทักษะการพัฒนาฮาร์ดแวร์ ซอฟต์แวร์และระบบสื่อสารข้อมูลโดยใช้เทคโนโลยีพลิกผัน เพื่อแก้ปัญหาทางวิศวกรรมชี้นำภาคธุรกิจและตอบสนองต่อภาวะพลิกผัน"
