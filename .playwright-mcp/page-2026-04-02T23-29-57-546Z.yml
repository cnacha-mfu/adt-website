        - heading [level=4] [ref=e106]
        - heading "ปรัชญา / วัตถุประสงค์" [level=4] [ref=e107]
        - paragraph [ref=e108]:
          - strong [ref=e109]: ปรัชญาของหลักสูตร
          - text: วิศวกรรมคอมพิวเตอร์เป็นศาสตร์ที่เกี่ยวข้องกับการออกแบบและสร้างเครื่อง หรือระบบคอมพิวเตอร์และระบบที่ใช้คอมพิวเตอร์ เกี่ยวข้องโดยตรงกับ ฮาร์ดแวร์ ซอฟต์แวร์และการสื่อสาร มีบทบาทสำคัญในการปฎิรูปอุตสาหกรรมเพื่อพัฒนาเศรษฐกิจและสังคมมาตั้งแต่อดีตจนกระทั่งถึงปัจจุบันและยังเป็นอีกหนึ่งศาสตร์ที่จำเป็นต่อการใช้รับมือกับภาวะพลิกผันต่างๆที่กำลังจะเกิดขึ้น ในปัจจุบันและอนาคต การคิดค้นทฤษฎีใหม่และนวัตกรรมทางวิศวกรรมคอมพิวเตอร์ยังคงมีความจำเป็นอย่างเร่งด่วนและต้องดำเนินการอย่างต่อเนื่องผ่านการพัฒนาทรัพยากรมนุษย์ในศาสตร์นี้ หลักสูตรนี้นำทฤษฎีการสร้างความรู้ของผู้เรียน คือ ทฤษฎีคอนสตรัคติวิสต์ (Constructivist Theory) มาเป็นรากฐานสำคัญในการออกแบบและพัฒนาหลักสูตร ทำการผสมผสานแนวคิดแบบคอนสตรัค
          - text: ติวิสต์เชิงปัญญา (Cognitive constructivism) และคอนสตรัคติวิสต์เชิงสังคม (Social constructivism)
          - text: เข้าด้วยกัน โดยเชื่อว่า การเรียนรู้ หรือการสร้างความรู้ เป็นกระบวนการที่เกิดขึ้นภายในของผู้เรียน โดยที่ผู้เรียนเป็นผู้สร้างความรู้ โดยการนำประสบการณ์หรือสิ่งที่พบเห็นในสิ่งแวดล้อมหรือสารสนเทศใหม่ที่ได้รับมาเชื่อมโยงกับความรู้ความเข้าใจที่มีอยู่เดิม มาสร้างเป็นความเข้าใจของตนเอง หรือ เรียกว่า โครงสร้างทางปัญญา (Cognitive structure) และใช้สถานการณ์ที่เป็นปัญหาและปฏิสัมพันธ์ทางสังคมก่อให้เกิดความขัดแย้งทางปัญญา เพื่อให้ได้มาซึ่งกิจกรรมการไตร่ตรองเพื่อขจัดความขัดแย้งเหล่านั้น ส่งผลให้มีการสร้างโครงสร้างใหม่ทางปัญญาขึ้นมาในที่สุด การจัดการเรียนการสอนตามทฤษฎีคอนสตรัคติวิสต์ จะสนับสนุนการสร้างมากกว่าความพยายามในการถ่ายทอดความรู้
          - text: การสอนแบบใช้ปัญหาเป็นฐาน (Problem Based Learning) จึงถูกนำมาใช้เป็นหลักสำคัญในการจัดการเรียนการสอน โดยเน้นให้ผู้เรียน เผชิญกับสถานการณ์จริง ค้นหาแนวทางการแก้ปัญหาด้วยตนเองผ่านการสนับสนุนของผู้สอนและการปฏิสัมพันธ์กับผู้อื่น
          - text: ดังนั้น หลักสูตรวิศวกรรมศาสตรมหาบัณฑิต สาขาวิชาวิศวกรรมคอมพิวเตอร์นี้ จึงมีความมุ่งมั่นในการผลิตมหาบัณฑิตที่มีความรู้ ความสามารถ ในศาสตร์ด้านวิศวกรรมคอมพิวเตอร์ มีสมรรถนะในการแข่งขัน มีทัศนคติเชิงบวกต่อการเปลี่ยนแปลงต่างๆ สามารถปรับตัวเข้ากับภาวะพลิกผัน สามารถต่อยอดองค์ความรู้ด้วยตนเองและสามารถบูรณาการศาสตร์ต่างๆที่เกี่ยวข้อง ในการสร้างงานวิจัยและนวัตกรรมเพื่อแก้ปัญหาทางวิศวกรรม ชี้นำภาคธุรกิจ และตอบสนองต่อภาวะพลิกผัน
        - paragraph [ref=e110]:
          - strong [ref=e111]: วัตถุประสงค์ของหลักสูตร
          - text: เพื่อมุ่งผลิตมหาบัณฑิตที่มีความรู้ มีความสามารถในเชิงวิจัยด้านวิศวกรรมคอมพิวเตอร์ การสื่อสาร และสารสนเทศ ยึดมั่นในจรรยาบรรณ มีทักษะศตวรรตที่ 21 มีทัศนคติเชิงบวกต่อภาวะพลิกผัน มีความสามารถในการพัฒนานวัตกรรมเพื่อตอบโจทย์ภาวะพลิกผันต่างๆ สามารถต่อยอดองค์ความรู้ด้วยตนเอง สามารถบูรณาการศาสตร์ต่างๆ ที่เกี่ยวข้อง และทำงานร่วมกับเครือข่ายทางวิชาการ งานวิจัย และนวัตกรรม ทั้งในระดับท้องถิ่น ระดับภูมิภาค และระดับนานาชาติ
