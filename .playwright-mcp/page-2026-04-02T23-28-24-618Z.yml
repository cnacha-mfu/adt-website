        - heading "ปรัชญา/วัตถุประสงค์" [level=4] [ref=e101]: ปรัชญา/วัตถุประสงค์
        - paragraph [ref=e102]:
          - strong [ref=e103]: ปรัชญาของหลักสูตร
          - text: ณ ปัจจุบัน องค์ความรู้ด้านวิศวกรรมดิจิทัลและการสื่อสารมีความจำเป็นต่อการดำเนินอุตสาหกรรมเพื่อพัฒนาเศรษฐกิจภายใต้การเปลี่ยนแปลงทางเทคโนโลยีสารสนเทศอย่างรวดเร็ว ไม่ว่าจะเป็นวิทยาการด้านอินเตอร์เน็ตของสรรพสิ่งซึ่งพบได้ในอุปกรณ์ต่าง ๆ รอบตัว การประมวลผลข้อมูลเพื่อให้ได้มาซึ่งสารสนเทศ ความปลอดภัยของสารสนเทศและระบบสารสนเทศ ความปลอดภัยไซเบอร์ซึ่งเกี่ยวเนื่องถึงความปลอดภัยของระบบการสื่อสารข้อมูล ซึ่งล้วนแต่ก่อให้เกิดการดำเนินการของการดำเนินชีวิตและเศรษฐกิจยุคใหม่
        - paragraph [ref=e104]: และดังที่ได้กล่าวมาข้างต้น บุคลากรที่มีส่วนสำคัญในการพัฒนาสิ่งเหล่านี้มีความต้องการจากภาคธุรกิจเป็นอย่างมาก เนื่องจากยังขาดบุคลากรที่มีความรู้และทักษะการนำไปใช้เป็นอย่างมาก
        - paragraph [ref=e105]: ด้วยเหตุนี้หลักสูตรวิศวกรรมศาสตรบัณฑิต สาขาวิชาวิศวกรรมดิจิทัลและการสื่อสาร สำนักวิชาเทคโนโลยีดิจิทัลประยุกต์ มหาวิทยาลัยแม่ฟ้าหลวง ได้มองเห็นความต้องการของภาคธุรกิจและความสำคัญขององค์ความรู้ดังกล่าวนี้ จึงได้ปรับปรุงหลักสูตรโดยมุ่งเน้นผลิตบัณฑิตทางด้านวิศวกรรมดิจิทัลและการสื่อสารที่เป็นผู้รู้จริง สามารถปฏิบัติงานได้จริงในระดับสากล (Pragmatism) โดยมีความรู้ความสามารถเฉพาะทางในการใช้งาน ประยุกต์ใช้ ออกแบบ สร้าง บำรุงรักษา และพัฒนาต่อยอด โดยมีความรู้ในด้านอินเตอร์เน็ตของสรรพสิ่ง การประมวลผลสารสนเทศ ความปลอดภัยของสารสนเทศ และความปลอดภัยไซเบอร์ โดยมุ่งเน้นการสร้างความรู้ที่ต้องมีการผสมผสานของเทคโนโลยีหลายด้านเข้าด้วยกัน เพื่อรองรับการให้บริการสารสนเทศภายใต้เทคโนโลยีสารสนเทศยุคใหม่ รวมถึงประกอบไปด้วย คุณธรรม และจริยธรรมวิชาชีพ อันจะก่อให้เกิดการพัฒนาประเทศในส่วนรวมอย่างยั่งยืน
        - separator [ref=e106]
        - paragraph [ref=e107]:
          - strong [ref=e108]: วัตถุประสงค์ของหลักสูตร
          - text: เพื่อผลิตบัณฑิตที่มีองค์ความรู้และความสามารถทั้งเชิงทฤษฎีและปฏิบัติทางด้านวิศวกรรมดิจิทัลและการสื่อสารในระดับสากล เน้นการออกแบบและพัฒนาระบบทางด้านวิศวกรรมดิจิทัลและการสื่อสาร ที่มีกรอบแนวคิดการเป็นผู้ประกอบการ ตลอดจนสามารถร่วมสร้างสรรค์ผลงานทางวิศวกรรมเพื่อตอบสนองตลาดแรงงานภาคอุตสาหกรรมภายใต้จริยธรรมทางวิชาการ
