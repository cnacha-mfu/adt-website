        - list [ref=e119]:
          - listitem [ref=e120]: "PLO1: มีวินัย เคารพกฎเกณฑ์ขององค์กรและสังคม มีจิตอาสาต่อส่วนรวม มีจริยธรรมทางวิชาการด้านวิศวกรรมดิจิทัลและการสื่อสาร"
          - listitem [ref=e121]: "PLO2: อธิบายหลักการและทฤษฎีด้านการประมวลผลข้อมูล ความปลอดภัยของสารสนเทศ ความปลอดภัยของระบบสารสนเทศ การสื่อสารข้อมูลและระบบสื่อสารข้อมูล และศาสตร์อื่นที่เกี่ยวข้องที่ทันกับการเปลี่ยนแปลงของเทคโนโลยี และวิศวกรรมดิจิทัลและการสื่อสารสมัยใหม่ และมีแนวคิดการเป็นผู้ประกอบการ"
          - listitem [ref=e122]: "PLO3: ออกแบบระบบหรือนวัตกรรมโดยบูรณาการความรู้ด้านวิศวกรรมดิจิทัลและการสื่อสาร ความต้องการของผู้ใช้และศาสตร์อื่น ๆ ที่เกี่ยวข้อง เพื่อแก้ไขปัญหาทางวิศวกรรมดิจิทัลและการสื่อสารได้"
          - listitem [ref=e123]: "PLO4: สามารถทำงานเป็นทีมร่วมกับสหวิชาชีพภายใต้สังคมพหุวัฒนธรรม"
          - listitem [ref=e124]: "PLO5: สามารถวิเคราะห์ข้อมูลเชิงตัวเลข ประยุกต์ใช้เทคโนโลยีด้านวิศวกรรมดิจิทัลและการสื่อสารสมัยใหม่ในการทำงานจริงได้ และสื่อสารทางวิชาการเพื่อตอบสนองความต้องการของผู้ใช้ได้"
          - listitem [ref=e125]: "PLO6: สร้างสรรค์และพัฒนาระบบทางด้านวิศวกรรมดิจิทัลและการสื่อสารที่ตอบสนองตลาดแรงงานภาคอุตสาหกรรม"
