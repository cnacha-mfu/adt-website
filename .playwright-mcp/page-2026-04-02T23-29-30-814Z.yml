        - paragraph [ref=e127]
        - paragraph
        - list [ref=e128]:
          - listitem [ref=e129]: PLO1 มีความรับผิดชอบต่อตนเองและสังคม มีความซื่อสัตย์ สุจริต เคารพกฎเกณฑ์ขององค์กร
          - listitem [ref=e130]: PLO2 สามารถอธิบายหลักการ ความรู้ ทฤษฎีที่สำคัญ และสามารถการเลือกใช้เครื่องมือด้านมัลติมีเดีย
          - listitem [ref=e131]: PLO3 มีทักษะในการคิดวิเคราะห์อย่างเป็นระบบ เพื่อในการออกแบบและสร้างสื่อมัลติมีเดียอย่างสร้างสรรค์
          - listitem [ref=e132]: PLO4 มีทักษะความเป็นผู้นำ ผู้ตาม และรับผิดชอบในการทำงานเป็นทีม ภายใต้สังคมพหุวัฒนธรรมได้
          - listitem [ref=e133]: PLO5 มีทักษะในการใช้เครื่องมือที่ในการออกแบบและสร้างสื่อมัลติมีเดียเพื่อการสื่อสาร
          - listitem [ref=e134]: PLO6 มีความสามารถในการบูรณาการความรู้และทักษะการออกแบบและสร้างสื่อมัลติมีเดีย
