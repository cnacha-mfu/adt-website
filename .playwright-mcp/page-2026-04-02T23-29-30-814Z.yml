        - heading "ปรัชญา / วัตถุประสงค์" [level=4] [ref=e101]: ปรัชญา / วัตถุประสงค์
        - paragraph [ref=e102]:
          - strong [ref=e103]: ปรัชญาของหลักสูตร
        - paragraph [ref=e104]: ผลิตบัณฑิตให้มีคุณภาพในระดับสากล มีความรอบรู้ด้านเทคโนโลยีมัลติมีเดีย และ การสร้างภาพเคลื่อนไหวอย่างเพียงพอ เกี่ยวข้องกับสร้างสื่อสมัยใหม่ การออกแบบ สร้างสรรค์สื่อออนไลน์ วิดีโอ ภาพยนตร์ และภาพเคลื่อนไหวทั้งสองมิติ และสามมิติ
        - paragraph [ref=e105]: หลักสูตรนี้นำทฤษฎีการสร้างความรู้ของผู้เรียน คือ Cognitive Theory เพื่อสร้างกระบวนการทางปัญญาหรือความคิดอย่างเป็นระบบ และส่งเสริมการพัฒนากระบวนคิดเชิงออกแบบ คือ Design Thinking เพื่อให้บัณฑิตเข้าใจความต้องการและปัญหาของการออกแบบตามกระบวนการวิจัยที่สอดคล้องกับความต้องการของผู้บริโภคและตอบโจทย์ภาคอุตสาหกรรมในยุคดิจิทัลดิสรัปชั่น (Digital Disruption) โดยมุ่งเน้นการลงมือทำ (Practicalism Theory) ให้มีทักษะสร้างสรรค์โดยประยุกต์ต่อยอดความรู้ด้วยตนเอง และสามารถบูรณาการศาสตร์ต่างๆที่เกี่ยวข้องในการสร้างสื่อตอบสนองต่อภาวะพลิกผันได้
        - paragraph [ref=e106]:
          - strong [ref=e107]: วัตถุประสงค์ของหลักสูตร
        - paragraph [ref=e108]
        - paragraph
        - list [ref=e109]:
          - listitem [ref=e110]: มีจิตสำนึกเชิงจริยธรรม จรรยาบรรณของวิชาชีพ และความรับผิดชอบต่อสังคม
          - listitem [ref=e111]: มีความรู้พื้นฐานด้านเทคโนโลยีมัลติมีเดียและการสร้างภาพเคลื่อนไหว
          - listitem [ref=e112]: มีความสามารถด้านเทคโนโลยีมัลติมีเดีย และการสร้างภาพเคลื่อนไหว ทั้งภาคทฤษฎีและภาคปฏิบัติ ในการออกแบบสื่อออนไลน์ และสร้างสรรค์สื่อดิจิตอลเสมือนจริงประเภทต่างๆ
          - listitem [ref=e113]: สามารถนำความรู้หรือเทคนิคการใช้เครื่องมือต่างๆ ประยุกต์ใช้กับศาสตร์อื่นเพื่อให้ทันสมัยกับภาคอุตสาหกรรม
        - heading "จุดเด่นของหลักสูตร" [level=4] [ref=e114]: จุดเด่นของหลักสูตร
        - paragraph [ref=e115]: หลักสูตรฯ ใหม่นี้ มีจุดเด่นเริ่มจากการเพิ่มกระบวนการเรียนการสอนที่เน้นการพัฒนากระบวนคิดเชิงออกแบบ (Design Thinking) เพื่อให้บัณฑิตเข้าใจความต้องการผู้บริโภคและตอบโจทย์ภาคอุตสาหกรรม และนำเอาทฤษฎีการสร้างความรู้ของผู้เรียน (Cognitive Theory) เพื่อสร้างกระบวนการทางปัญญาหรือความคิดอย่างเป็นระบบ อีกทั้งมุ่งเน้นการลงมือทำ (Practicalism Theory) ให้มีทักษะสร้างสรรค์โดยประยุกต์ต่อยอดความรู้ด้วยตนเอง และสามารถบูรณาการศาสตร์ต่างๆที่เกี่ยวข้องในการสร้างสื่อตอบสนองต่อภาวะพลิกผันได้ มุ่งเน้นการสร้างบัณฑิต 2 กลุ่มใหญ่ คือ นักสร้างสรรค์เนื้อหาออนไลน์ (Online Content Creator) และ นักสร้างภาพเสมือนจริง (Virtual Reality, Augmented Reality, Mixed Reality) จากรูปแบบการภาพเคลื่อนไหว 3 มิต เป็นต้น
