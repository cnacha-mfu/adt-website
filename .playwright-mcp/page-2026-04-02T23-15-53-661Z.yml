        - list [ref=e133]:
          - listitem [ref=e134]:
            - text: PLO1 สร้างองค์ความรู้หลักด้านปัญญาประดิษฐ์ แพลตฟอร์มระบบสื่อสาร การประมวลผลต้นทางและระบบอัตโนมัติผ่านกระบวนการวิจัย
            - list [ref=e135]:
              - listitem [ref=e136]: Sub-PLOs 1.1 อภิปรายเชื่อมโยงสาระที่สำคัญของเทคโนโลยีพลิกผัน ด้านปัญญาประดิษฐ์ แพลตฟอร์มระบบสื่อสาร การประมวลผลต้นทาง และระบบอัตโนมัติ
              - listitem [ref=e137]: Sub-PLOs 1.2 สร้างองค์ความรู้ใหม่โดยเชื่อมโยงองค์ความรู้ด้านปัญญาประดิษฐ์แพลตฟอร์มระบบสื่อสาร การประมวลผลต้นทาง และระบบอัตโนมัติผ่านกระบวนการวิจัย
          - listitem [ref=e138]:
            - text: PLO2 สร้างนวัตกรรมต้นแบบเชิงเทคนิค หรือต่อยอดองค์ความรู้หลักเพื่อนำไปใช้ประโยชน์เชิงสังคมหรือเชิงพาณิชย์
            - list [ref=e139]:
              - listitem [ref=e140]: Sub-PLOs 2.1 นำเสนอการต่อยอดองค์ความรู้ด้านปัญญาประดิษฐ์ แพลตฟอร์มระบบสื่อสาร การประมวลผลต้นทาง และระบบอัตโนมัติ
              - listitem [ref=e141]: Sub-PLOs 2.2 พัฒนาและถ่ายทอดต้นแบบเชิงเทคนิคด้านปัญญาประดิษฐ์ แพลตฟอร์มระบบสื่อสาร การประมวลผลต้นทาง และระบบอัตโนมัติ เพื่อการใช้ประโยชน์เชิงสังคมหรือเชิงพาณิชย์ สู่ระดับท้องถิ่น ระดับชาติ ระดับภูมิภาค และระดับนานาชาติ
          - listitem [ref=e142]:
            - text: PLO3 ปฏิบัติตามหลักจริยธรรมวิจัยทั่วไปและหลักจริยธรรมวิจัยในมนุษย์เพื่อสร้างองค์ความรู้ใหม่
            - list [ref=e143]:
              - listitem [ref=e144]: Sub-PLOs 3.1 ใช้หลักจริยธรรมวิจัยในมนุษย์ในงานวิจัยที่เกี่ยวข้องกับมนุษย์
              - listitem [ref=e145]: Sub-PLOs 3.2 ดำเนินกระบวนการวิจัย การรวบรวมข้อมูล การทดลอง และการวิเคราะห์ผลอย่างเที่ยงตรง
              - listitem [ref=e146]: Sub-PLOs 3.3 สร้างผลงานวิชาการด้วยความซื่อสัตย์ ไม่คัดลอกผลงานผู้อื่น
          - listitem [ref=e147]:
            - text: PLO4 แสดงออกถึงการเรียนรู้ด้วยตนเอง พัฒนาตนเองอย่างต่อเนื่อง และปรับตัวในการทำงานเป็นทีมพร้อมรับความเปลี่ยนแปลง
            - list [ref=e148]:
              - listitem [ref=e149]: Sub-PLOs 4.1 วิพากษ์เชิงวิชาการด้วยความมั่นใจ รับฟังความเห็นต่าง และปรับตัวในการทำงานเป็นทีม
              - listitem [ref=e150]: Sub-PLOs 4.2 เลือกแนวทางในการเรียนรู้ด้วยตนเองและพัฒนาตนเองอย่างต่อเนื่อง
          - listitem [ref=e151]:
            - text: PLO5 ปฏิบัติตนโดยมุ่งเน้นความสำเร็จในการพัฒนางานที่เกี่ยวข้องกับศาสตร์วิศวกรรมคอมพิวเตอร์ขั้นสูง
            - list [ref=e152]:
              - listitem [ref=e153]: Sub-PLOs 5.1 กำหนดเป้าหมายความสำเร็จทางวิชาการที่เกี่ยวข้องกับศาสตร์วิศวกรรม คอมพิวเตอร์ขั้นสูง
              - listitem [ref=e154]: Sub-PLOs 5.2 ปฏิบัติตนตามเป้าหมายความสำเร็จ
