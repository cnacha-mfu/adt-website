        - heading "ปรัชญา / วัตถุประสงค์" [level=4] [ref=e107]
        - paragraph [ref=e108]: วิศวกรรมคอมพิวเตอร์เป็นศาสตร์ที่เกี่ยวข้องกับการออกแบบและสร้างเครื่อง หรือระบบคอมพิวเตอร์และระบบที่ใช้คอมพิวเตอร์ เกี่ยวข้องโดยตรงกับ ฮาร์ดแวร์ ซอฟต์แวร์และการสื่อสาร มีบทบาทสำคัญในการปฎิรูปอุตสาหกรรมเพื่อพัฒนาเศรษฐกิจและสังคมมาตั้งแต่อดีตจนกระทั่งถึงปัจจุบันและยังเป็นอีกหนึ่งศาสตร์ที่จำเป็นต่อการใช้รับมือกับภาวะพลิกผันต่างๆที่กำลังจะเกิดขึ้นในปัจจุบันและอนาคต นับตั้งแต่มีการปฏิวัติอุตสาหกรรม ครั้งที่ 3 ในปี 1969 จนถึงปัจจุบัน เทคโนโลยีพลิกผัน (Disruptive Technologies) ได้เข้ามาทำให้หลายสิ่งเปลี่ยนแปลงไปจากที่เคยเป็นอยู่ ส่งกระทบต่อธุรกิจและการดำเนินชีวิตของผู้คน
        - paragraph [ref=e109]: อย่างไรก็ตาม เทคโนโลยีที่เกิดใหม่ทุกชนิด ไม่สามารถทำให้ลักษณะของธุรกิจหรือสังคมเปลี่ยนแปลงได้ทั้งหมด มีเทคโนโลยีบางประเภทเท่านั้นที่มีศักยภาพอย่างแท้จริง ที่ส่งผลให้เกิดการเปลี่ยนแปลงต่อสถานการณ์ปัจจุบันอย่างมาก โดยเฉพาะวิศวกรรมคอมพิวเตอร์ ดังนั้นการคิดค้นทฤษฎีใหม่และนวัตกรรมทางวิศวกรรมคอมพิวเตอร์ยังคงมีความจำเป็นอย่างเร่งด่วนและต้องดำเนินการอย่างต่อเนื่องผ่านการพัฒนาทรัพยากรมนุษย์ในศาสตร์นี้
        - paragraph [ref=e110]:
          - text: รากฐานสำคัญของหลักสูตรนี้ คือ การนำทฤษฎีคอนสตรัคติวิสต์ (Constructivist Theory)
          - text: มาผสมผสานกับการเรียนรู้เฉพาะบุคคล (Personalized Learning) โดยทฤษฎีคอนสตรัคติวิสต์ (Constructivist Theory) มีการผสมผสานแนวคิดแบบคอนสตรัคติวิสต์เชิงปัญญา (Cognitive Constructivism) และคอนสตรัคติวิสต์เชิงสังคม (Social Constructivism) เข้าด้วยกัน โดยเชื่อว่า ผู้เรียนเป็นผู้สร้างความรู้ โดยการนำประสบการณ์หรือสิ่งที่พบเห็นในสิ่งแวดล้อมหรือสารสนเทศใหม่ที่ได้รับมาเชื่อมโยงกับความรู้ความเข้าใจที่มีอยู่เดิม มาสร้างเป็นความเข้าใจของตนเอง และใช้สถานการณ์ที่เป็นปัญหาหรือความขัดแย้งทางปัญญาที่เกิดจากการปฏิสัมพันธ์ทางสังคมกับผู้อื่น ทำให้เกิดการไตร่ตรองเพื่อขจัดความขัดแย้งเหล่านั้นและนำไปสู่การสร้างโครงสร้างใหม่ทางปัญญาขึ้นกับผู้เรียน หลักสูตรจึงใช้กระบวนการจัดการเรียนการสอนโดยการใช้ปัญหาหรือโครงงานเป็นฐาน (Problem or Project based Learning) เพื่อสนับสนุนทฤษฎีดังกล่าว โดยเน้นให้ผู้เรียนเผชิญกับสถานการณ์จริง ค้นหาแนวทางการแก้ปัญหาด้วยตนเองผ่านการสนับสนุนของผู้สอนและการปฏิสัมพันธ์กับผู้อื่น
        - paragraph [ref=e111]: การเรียนรู้เฉพาะบุคคล (Personalzied Learning) คือ การให้ผู้เรียนได้มีส่วนร่วมในการกำหนดแนวทางการเรียนการสอน ตามความถนัดหรือเป้าหมายของตนเอง อยู่บนพื้นฐานความเชื่อที่ว่า ผู้เรียนมีความแตกต่างกันในเรื่อง ความชอบ ความถนัดและความสามารถ ผู้เรียนแต่ละคนจึงควรมีโอกาส ตั้งเป้าหมายการเรียนรู้และเลือกเรียนรู้ในประเด็นที่ตนสนใจได้ด้วยตนเอง หลักสูตรนี้จึงดำเนินการจัดการเรียนการสอนโดยเอาสมรรถนะของผู้เรียน (Competency) เป็นตัวตั้ง โดยใช้เวลาและวิธีการอย่างยืดหยุ่นตามธรรมชาติของผู้เรียนแต่ละคน เพื่อพัฒนาผู้เรียนอย่างเต็มประสิทธิภาพตลอดทั้งกระบวนการของการศึกษา โดยมีกิจกรรมสนับสนุนการเรียนรู้ ทีมผู้ให้คำปรึกษาที่เข้มแข็ง และระบบการประเมินสมรรถนะที่สอดคล้องควบคู่ไปด้วย
        - paragraph [ref=e112]: หลักสูตรปรัชญาดุษฎีบัณฑิต สาขาวิชาวิศวกรรมคอมพิวเตอร์นี้ จึงมุ่งเน้นในการผลิตดุษฎีบัณฑิตที่สามารถสร้างองค์ความรู้และนวัตกรรมเชิงพาณิชย์ทางด้านวิศวกรรมคอมพิวเตอร์ เพื่อแก้ปัญหาและตอบสนองต่อสถานการณ์จริงและตอบสนองต่อความต้องการการใช้งานของกลุ่มเป้าหมาย ได้หลากหลายกลุ่ม ผู้เรียนมีอิสระในการกำหนดหัวข้องานวิจัยและวางแผนเส้นทางการเรียนรู้ได้ด้วยตนเอง โดยมีทีมที่ปรึกษาให้คำแนะนำ ติดตามประเมินผล และมีกิจกรรมสนับสนุนการศึกษาตลอดหลักสูตร
