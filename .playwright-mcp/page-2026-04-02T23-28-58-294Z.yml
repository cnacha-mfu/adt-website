                - /url: https://www.mfu.ac.th/education/program/program-bachelor/bachelor-information-technology/bsc-program-science/bachelor-it-information.html
          - paragraph [ref=e83]: หลักสูตร DTBI เป็นหลักสูตรที่เกิดจากวิสัยทัศน์ของสำนักวิชาเทคโนโลยีสารสนเทศ ที่มองเห็นถึงความเปลี่ยนแปลงอันรวดเร็วของเทคโนโลยีต่อชีวิตมนุษย์ โดยเฉพาะอย่างยิ่งด้านการสื่อสาร ซึ่งเป็นกิจกรรมหลักของมนุษย์ที่เป็นพื้นฐานต่อกิจกรรมอื่นๆอีกมากมาย เช่นการประกอบอาชีพ โดยเฉพาะด้านธุรกิจที่เทคโนโลยีดิจิทัลได้เข้ามามีบทบาทอย่างมาก ไม่ใช่เพียงเพื่อการประชาสัมพันธ์ สื่อสารกับผู้บริโภค หากแต่เทคโนโลยีเหล่านี้ถูกใช้มาเป็นกลไกหลักในการประกอบธุรกิจ ดังจะเห็นได้จากบริการอันหลากหลายเกี่ยวกับการซื้อขาย การให้บริการอาหาร การให้บริการแบบเคลื่อนที่ ที่สามารถเรียกใช้จากสถานที่ใด เวลาใด จากเครื่องมือใดก็ได้ที่มีการเชื่อมต่อกับโครงข่ายอินเตอร์เน็ต ดังนั้นการเปิดบริการหลักสูตรที่เน้นให้เป็นผู้ประยุกต์ใช้เทคโนโลยีเพื่อประกอบการให้เกิดผลประโยชน์ใดๆย่อมเป็นที่ต้องการของสังคม โดยเฉพาะอย่างยิ่งสังคมไทยที่มีภาคการผลิตอยู่เยอะ แต่ยังขาดการขาย การตลาดที่มีประสิทธิภาพและสะดวกใช้กับบุคคลที่แม้จะมีความรู้ด้านเทคโนโลยีน้อย ดังนั้นจึงเป็นโอกาสที่ดีต่อนักเรียน นักศึกษาตลอดจนผู้สนใจ ที่จะฝึกฝนตนเองเพื่อให้สามารถเป็นผู้ประกอบการยุคใหม่ที่เน้นประยุกต์ใช้เทคโนโลยีดิจิทัลเพื่อเป็นผู้เชื่อมต่อระหว่างผู้ผลิต และผู้บริโภค
          - paragraph [ref=e84]: หลักสูตร DTBI มุ่งเน้นสร้างผู้ประกอบการที่เป็นลักษณะสตาร์ทอัพ โดยมีรายวิชาที่เกี่ยวกับการประกอบการ การทำ Startup หลากหลายวิชา ทั้งนี้ในรายวิชาชีพเลือก ทั้งหมด 5 รายวิชา ผู้เรียนยังสามารถเลือกรายวิชาในกลุ่มการวิเคราะห์ข้อมูล และการทำการตลาดดิจิทัลด้วย ซึ่งผู้ผ่านหลักสูตรสามารถเป็นผู้ประกอบการ นักการตลาดดิจิทัล นักวิเคราะห์ระบบ นักวิคราะห์ข้อมูล
          - paragraph [ref=e85]: หลักสูตรได้จัดเตรียมรายวิชาที่ทันสมัย และสามารถนำไปใช้ได้จริง นอกจากนี้ยังนำรูปแบบการเรียนการสอนแบบใหม่ ในรูปแบบโครงงานเพื่อให้นักศึกษาได้ลงมือทำกับโจทย์จริง และเรียนในรูปแบบบูรณาการไม่แยกสาระวิชา ซึ่งจะช่วยให้ผู้เรียนสามารถเห็นความเชื่อมโยงของแต่ละศาสตร์วิชาในวางแผน ปฏิบัติ และแก้ปัญหาจริง หลักสูตรนี้เป็นหลักสูตรปริญญาตรีวิทยาศาสตร์บัณฑิต 4 ปี ตามมารตฐานของสำนักงานคณะกรรมการการอุดมศึกษา กระทรวงการอุดมศึกษา มีทั้งหมด 120 หน่วยกิต หากแต่สำนักวิชาฯจะจัดการเรียนการสอนให้ผู้เรียนสามารถจบได้ก่อน 4 ปี โดยเรียนทุกรายวิชาภายในปี 3 และฝึกงานอีกหนึ่งภาคการศึกษาใน ปี 4 เทอม 1 ทั้งนี้เพื่อเป็นการส่งเสริมให้ผู้เรียนได้เข้าสู่ชีวิตการทำงานให้เร็วขึ้น โดยในช่วงระหว่างการเรียนรู้ในมหาวิทยาลัย นักศึกษาจะได้เรียนรู้ ลองผิด ลองถูกกับการทำงานในมิติต่างๆของธุรกิจดิจิทัล
