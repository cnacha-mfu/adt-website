        - heading "ปรัชญา / วัตถุประสงค์" [level=4] [ref=e180]: ปรัชญา / วัตถุประสงค์
        - paragraph [ref=e181]:
          - strong [ref=e182]: ปรัชญาของหลักสูตร
          - text: วิศวกรรมซอฟต์แวร์เป็นศาสตร์ที่เกี่ยวข้องกับกระบวนการทางวิศวกรรมในการพัฒนาซอฟต์แวร์ ตั้งแต่การรวบรวม ระบุความต้องการจากผู้ใช้งาน การกำหนดขอบเขต การออกแบบ การพัฒนา
        - paragraph [ref=e183]: การทดสอบ การบริหารจัดการโครงการ การควบคุมคุณภาพ และความมั่นคงของระบบซอฟต์แวร์ มีบทบาทสำคัญในการปฏิรูปอุตสาหกรรมเพื่อพัฒนาเศรษฐกิจและสังคม โดยนำซอฟต์แวร์เข้ามาจัดเก็บและประมวลผลข้อมูล เพิ่มขีดความสามารถในการแข่งขันทั้งภาคการผลิตและบริการ เพื่อให้พร้อมรับมือกับภาวะที่พลิกผันต่าง ๆ ที่กำลังจะเกิดขึ้นในอนาคต หลักสูตรนี้เชื่อว่า ทฤษฎีการสร้างความรู้ด้วยตนเอง(Constructivism) ซึ่งเป็นหนึ่งในทฤษฎีการเรียนรู้ของมนุษย์ สามารถนำมาประยุกต์ใช้ในการออกแบบและพัฒนาหลักสูตร ให้บัณฑิตได้คิดเชิงวิพากษ์ (Critical Thinking) จากการสร้างมโนทัศน์และฝึกแก้ไขปัญหา (Problem Solving) อย่างเป็นระบบ โดยจัดการเรียนการสอนด้วยโครงงานเป็นฐาน (Project based learning)
        - paragraph [ref=e184]: หลักสูตรนี้มุ่งผลิตวิศวกรซอฟต์แวร์ที่คิดอย่างสร้างสรรค์ ใช้กระบวนการพัฒนาซอฟต์แวร์ ในการวิเคราะห์บูรณาความรู้เพื่อแก้ปัญหาที่หลากหลาย สามารถทำงานร่วมกับคนในองค์กรสื่อสารได้อย่างมีประสิทธิภาพ มีคุณธรรม จริยธรรม ปฏิบัติงานได้จริง มีความรู้ ความเข้าใจในวิชาชีพ สามารถจัดการกับปัญหา มีความรับผิดชอบ ซื่อสัตย์ เสียสละ เป็นแบบอย่างที่ดี ตอบสนองความต้องการบุคลากรที่มีคุณภาพในภาคอุตสาหกรรมซอฟต์แวร์ในการพัฒนา
        - separator [ref=e185]
        - paragraph [ref=e186]:
          - strong [ref=e187]: วัตถุประสงค์ของหลักสูตร
          - text: เพื่อมุ่งผลิตบัณฑิตที่มีความรู้ ความสามารถ และประสบการณ์ จากสถานการณ์จริงที่สามารถสร้างซอฟต์แวร์หรือระบบสารสนเทศที่สามารถนำไปใช้ประโยชน์เชิงพาณิชย์หรือพัฒนาสังคม มีจริยธรรมและยึดมั่นในจรรยาบรรณ สามารถทำงานร่วมในสังคมพหุวัฒนธรรม มีทักษะศตวรรษที่ 21 ก้าวทันเทคโนโลยีที่พลิกผัน สามารถพัฒนาและต่อยอดองค์ความรู้ด้วยตนเอง บูรณาการกับศาสตร์อื่น ๆ ที่เกี่ยวข้อง
