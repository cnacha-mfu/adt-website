  - generic [ref=e66]:
    - generic [ref=e67]:
      - banner [ref=e69]:
        - heading "สาขาวิชาวิศวกรรมซอฟต์แวร์ หลักสูตรปริญญาตรี" [level=2] [ref=e70]
      - generic [ref=e71]:
        - paragraph [ref=e72]
        - paragraph [ref=e73]:
          - text: สาขา วิศวกรรมซอฟต์แวร์ (Software Engineering) เราปรับหลักสูตรรับปีการศึกษา 2563 เพื่อเลือกสิ่งที่เป็นที่ต้องการมากที่สุดในตลาด ให้ผู้เรียนได้เรียนรู้ ที่เห็นด้านล่างเป็น Software Engineering Framework ที่ทีมงานได้จัดสรรค์ และคัดสรรค์ เป็นอย่างดี โดยผ่านการวิเคราะห์ ทั้งจากทีม อาจารย์ พี่ๆที่อยู่ในวงการซอฟต์แวร์ รวมถึงรุ่นพี่ ที่ทำงานอยู่ในวงการ ในการปรับให้เทคโนโลยีในแต่ละชั้นปี มีความเหมาะสม ทั้งในแง่ของการพัฒนาความสามารถ สอดคล้องกับโมเดลในการสร้างรายได้ของผู้เรียน
          - strong [ref=e74]: (ที่นี่ เรียนเสร็จ เอาไปใช้งานได้เลย ใช้วิชา หาเงินได้จริง)
          - text: นอกจากนี้เรายังเสริมความรู้ด้าน Emerging Technology เช่น AI, ML, Big Data, Data Analytic, รวมไปถึง BlockChain
          - emphasis [ref=e75]: (*จัดอยู่ในกลุ่มวิชาเลือก ตามความถนัด หรือสนใจของผู้เรียน) เ
          - text: พื่อนำมาใช้ในการพัฒนา ระบบที่ฉลาด Smart กว่าเดิม และเป็นที่ต้องการของผู้ใช้ และตลาดงาน
        - heading "ทักษะที่จะได้รับการพัฒนาในแต่ละชั้นปี" [level=3] [ref=e76]:
          - strong [ref=e77]: ทักษะที่จะได้รับการพัฒนาในแต่ละชั้นปี
        - paragraph [ref=e78]
        - paragraph
        - list [ref=e79]:
          - listitem [ref=e80]:
            - strong [ref=e81]: "ปี 1 น้องใหม่:"
            - text: เราจะเรียนรู้กระบวนการในการพัฒนาซอฟต์แวร์ในรูปแบบ Agile หลักวิธีคิดและอัลกอริทึม การแปลงโจทย์ปัญหา ให้เป็นแผนภาพ เพื่อให้สามารถส่งต่อให้ทีมงาน พัฒนาต่อได้ การเรียนรู้หลักการของ OOP (Object Oriented Programming) และภาษา Java ซึ่งยังคงมีใช้งานในระบบงานปัจจุบัน การจัดการกับโค้ดด้วย Git ให้สามารถทำงานเป็นทีมร่วมกันได้ การใช้เครื่องมือ ที่ยังได้รับความนิยมในองค์กร อย่าง eclipse และ Netbeans การเรียนรู้วิธีการพัฒนาเว็ปไซต์ ด้วยเทคโนโลยี HTML5, CSS3, และ JavaScript โดยระหว่างเรียน
            - strong [ref=e82]: ผู้เรียนจะสามารถรับงานเขียนโปรแกรมหรือเว็ปไซต์หลัก ร้อย ถึง หลักหมื่น ได้
          - listitem [ref=e83]:
            - strong [ref=e84]: "ปี 2 เริ่มหัดเดิน:"
            - text: จะเริ่มเข้าสู่การเรียนรู้วิธีการพัฒนาระบบ แต่ละประเภท ทั้ง Mobile Application, Web Application, การออกแบบ UX/UI การแปลงความต้องการของผู้ใช้ (Software Requirements) ให้กลายเป็น Software Spec ที่มีความกระชับ ชัดเจน การเขียน User Story แล้วเลือกวิธีการพัฒนาที่เหมาะสม โดยสามารถใช้เทคโนโลยีและเครื่องมือที่เหมาะสม การพัฒนา Mobile Application ต่อยอดจากวิชาที่เรียน ทั้ง Android/iOS (ตามความสนใจ เพราะเรามีกลุ่มชมรมรองรับ) การพัฒนา Web Application ด้วย Framework ที่เหมาะสม ทั้ง Angular, Vue.js, NUXT.JS, ReactJS , SpringBoot โดยเรียนรู้ควบคู่กับการใช้ฐานข้อมูล MySQL, PostgreSQL, MongoDB หรือแม้แต่ Firebase RDB (Realtime Database) เพื่อให้ผู้เรียนมีความรู้ความเข้าใจ และสามารถ "ฉลาดเลือก" เครื่องมือและแพลตฟอร์ม ให้เหมาะสมกับงาน นอกจากนี้เรายังปลูกฝังกระบวนการทำงานแบบ DevOps ซึ่งเริ่มมีการถูกนำมาใช้งานอย่างแพร่หลายในกลุ่มบริษัทพัฒนาซอฟต์แวร์ยุคใหม่ ตั้งแต่กระบวนการ Development, Build , Test, และ Deploy โดยเป็นการเรียนรู้ทั้งภาคทฤษฏีและปฏิบัติ เพื่อให้พร้อมสำหรับการออกไปทำงานร่วมกับทีมงานมืออาชีพได้จริง หลังจากผ่านปี 2
            - strong [ref=e85]: ผู้เรียนสามารถเริ่มรับงานโครงการหลัก พัน จนถึง หลักหมื่น ได้ อีกทั้งยังสามารถเริ่มพัฒนา Mobile App และส่งขึ้น Store (ตามแบบรุ่นพี่และอาจารย์) เพื่อสร้างรายได้แบบ Passive Income ได้แบบยั่งยืน
          - listitem [ref=e86]:
            - strong [ref=e87]: "ปี 3 เริ่มเดินและออกวิ่ง:"
            - text: จะเร่ิมเข้าสู่ช่วงของการคิดและพัฒนาโครงงานของตนเอง โดยใช้เทคโนโลยีทางเลือก ที่เป็นที่นิยมในตลาด ทั้งตลาดในประเทศและต่างประเทศ (ณ.ตอนนี้ เราเลือก Docker, K8S, React, Node ในการตั้งต้น) การวางโครงสร้างสถาปัตยกรรมซอฟต์แวร์ด้วยตัวเอง และวางสภาพแวดล้อมในการทำงานร่วมกันเป็นทีม การบริหารโครงการขนาดกลางและขนาดใหญ่ การสร้าง Web APIs สำหรับโครงการขนาดใหญ่ ทำให้ผู้เรียน สามารถทำงานในลักษณะ Full Stack Devlopment ได้อย่างมั่นใจ นอกจากนั้นผู้เรียนยังสามารถเริ่มเรียนรู้ภาษาทางเลือกอย่าง Python หรือภาษาอื่น เพื่อต่อยอดไปยังเทคโนโลยีขั้นสูงต่อไป
            - strong [ref=e88]: หลังจากผ่านชั้นปีนี้ ระดับวุฒิภาวะของผู้เรียนจะสูงขึ้น มีศักยภาพในการเรียนรู้สิ่งใหม่ๆ ได้ด้วยตัวเอง และรู้จักการให้และถ่ายทอดความรู้ โดยสามารถเริ่มสร้างทีมงานของตัวเอง (ขนาดประมาณ 3-5 คน) ในการรับงานหลักหมื่น ถึง หลักแสน ได้ โดยมีทีมอาจารย์ คอยช่วยให้คำปรึกษาอย่างใกล้ชิด และหากยังพัฒนา Mobile App ควบคู่ไปด้วยตั้งแต่จบปี 2 (ใช้หลักการ 1 เดือน 1 แอพ) ผู้เรียนจะเริ่มมีรายได้ในลักษณะ Passive ประมาณ $100-$300 เหรียญ ต่อเดือน ได้ (ประมาณ 3000 - 9000 บาท ต่อเดือน)
          - listitem [ref=e89]:
            - strong [ref=e90]: "ปี 4 เตรียมตัวออกเดินทาง:"
            - text: เป็นช่วงทางเลือก ทั้งเรื่องของการเลือกสถานที่ฝึกงาน และเลือกเส้นทางในการเป็น Specialist ในแต่ละด้านที่ตนเองชอบ โดยผู้เรียนสามารถเลือกที่จะเรียน และเข้าร่วมกลุ่มชมรมพิเศษ เช่น กลุ่มงาน BigData, กลุ่ม IoT (Internet of Things), Emerging Technology เช่น AI, ML, Blockchain, กลุ่ม BI/BA (Business Inteligence, Business Analytic) หรือกลุ่ม Enterprise Application อย่าง SAP ERP เป็นต้น โดยแต่ละกลุ่มจะเป็นกลุ่มที่สามารถรับงานจริง เข้ามาพัฒนา การแบ่งปันองค์ความรู้ และการถ่ายทอดทักษะ ทั้งในด้านของการพัฒนา การวางแผน การเจรจาธุรกิจ รวมถึงการเข้าถึงแหล่งทุนต่างๆ โดยมีทีมอาจารย์ รุ่นพี่ศิษย์เก่า เครื่อข่ายผู้ประกอบการและนักลงทุน รวมไปถึงหน่วยงานสนับสนุนของมหาวิทยาลัย ในการผลักดันให้สามารถก้าวไปได้ไกลกว่าที่คุณคิด
            - strong [ref=e91]: หลังจากจบปี 4 ผู้เรียนที่ผ่านตามเกณฑ์จะสามารถ คุมทีมขนาด 5-10 คนได้ และสามารถรับงาน หลักหมื่น จนถึงหลักล้าน ได้ และถ้ายังพัฒนาปรับปรุง Mobile App อย่างต่อเนื่อง ผู้เรียนสามารถมีรายได้แบบ Passive Income อยุ่ที่ $300-$1000 ต่อเดือน (9,000 - 30,000 บาท ต่อเดือน)
        - heading "รายวิชาที่เปิดสอน ในสาขาวิศวกรรมซอฟต์แวร์" [level=3] [ref=e92]:
          - strong [ref=e93]: รายวิชาที่เปิดสอน ในสาขาวิศวกรรมซอฟต์แวร์
        - paragraph [ref=e94]:
          - strong [ref=e95]
        - paragraph [ref=e96]: กลุ่มวิชาที่จัดไว้ สร้างมาเพื่อความสมดุล เน้นเรียนรู้ตั้งแต่พื้นฐาน การออกแบบ การบริหารจัดการ การพัฒนา การควบคุมคูณภาพ การออกแบบสถาปัตยกรรม สู่การเลือกเส้นทางที่สนใจ เพื่อพร้อมสู่การเป็นวิศวกรซอฟต์แวร์มืออาชีพ หรือเป็นผู้ประกอบการ
        - heading "รูปแบบการเนียนการสอน" [level=3] [ref=e97]
        - paragraph [ref=e98]: การเรียนการสอนเน้นทั้งทฤษฏีและปฏิบัติ โดย น.ศ. จะได้ลงมือทำงานจริง ผ่านกิจกรรมด้วยโจทย์จริง และพัฒนาผลงานเพื่อนำเผยแพร่ ด้วยมาตรฐานเดียวกับการทำงานจริง ส่วนของ mobile application จะได้นำขึ้น App Store และ Play Store จริง ทำให้ น.ศ. มีประสบการณ์ในการทำงานจริงๆ
        - paragraph [ref=e99]
        - paragraph [ref=e100]: กิจกรรมเสริมการเรียนรู้ ตั้งแต่เข้าเรียน น้องปี 1 จะปรับพื้นฐานด้วยกิจกรรม Code Camp และ ปี 2 จะฝึกฝนการพัฒนาระบบด้วยกิจกรรม Hackathon ส่วนปี 3, 4 จะได้โอกาสในการแลกเปลี่ยนกับนักพัฒนาและผู้ประกอบการซอฟต์แวร์ ผ่านกิจกรรม BarCamp
        - paragraph [ref=e101]
        - heading "เรียนสายนี้ งานดี เงินดี แน่นอน" [level=3] [ref=e102]
        - paragraph [ref=e103]:
          - text: ที่เห็นคือตัวอย่างประกาศรับสมัครงาน จากเว็บดังด้านไอที เงินเดือนเฉลี่ยของสายงานนี้ หลังจากทำงานไปแล้ว 2-3 ปี อยู่ที่ 30,000 - 150,000 บาท ต่อเดือน ขึ้นอยู่กับประสบการณ์และความสามารถ สำหรับใครที่เรียนสาย Software Engineering ตอนนี้กำลังเป็นที่ต้องการและยื้อแย่งกันในตลาด เนื่องมาจาก
          - strong [ref=e104]: คนสายนี้จะครบเครื่องทั้งเรื่องกระบวนการในการพัฒนา และทักษะในการพัฒนาซอฟต์แวร์
        - paragraph [ref=e105]:
          - strong [ref=e106]
        - paragraph [ref=e107]
        - paragraph [ref=e108]: เรียน SE เป็นที่ต้องการของตลาด งานดี เงินดี รับประกัน ... หรือจะผันตัวเองไปเป็น Start Up หรือเปิดบริษัท ของตัวเอง เราก็มีหน่วยงาน และทีมอาจารย์ที่พร้อมให้การสนับสนุน
        - paragraph [ref=e109]:
          - strong [ref=e110]: แนวทางการประกอบอาชีพ ของผู้จบการศึกษา สาขาวิศวกรรมซอฟต์แวร์
        - paragraph
