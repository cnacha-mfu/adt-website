        - paragraph [ref=e210]
        - paragraph
        - list [ref=e211]:
          - listitem [ref=e212]: PLO1 มีความซื่อสัตย์ เคารพความเป็นส่วนตัวของผู้อื่น และรับผิดชอบต่อหน้าที่ คำนึงถึงประโยชน์ส่วนรวม มีความรับผิดชอบในวิชาชีพ
          - listitem [ref=e213]: PLO2 อภิปรายเชื่อมโยงสาระที่สำคัญของเทคโนโลยีและวิธีการทางซอฟต์แวร์ การเป็นผู้ประกอบการ เทคโนโลยีกำเนิดใหม่สำหรับวิศวกรรมซอฟต์แวร์ กับศาสตร์อื่น ๆ ที่เกี่ยวข้องภายใต้เทคโนโลยีที่พลิกผัน
          - listitem [ref=e214]: PLO3 ออกแบบโครงสร้างสถาปัตยกรรมซอฟต์แวร์หรือระบบสารสนเทศ โดยบูรณาการศาสตร์ของเทคโนโลยีและวิธีการทางซอฟต์แวร์ร่วมกับศาสตร์อื่น ๆ ที่เกี่ยวข้องได้อย่างเหมาะสมภายใต้เทคโนโลยีที่พลิกผัน
          - listitem [ref=e215]: PLO4 มีมีภาวะความเป็นผู้นำและผู้ตามที่ดี และปฏิบัติงานร่วมกับผู้อื่นภายใต้สังคมพหุวัฒนธรรม
          - listitem [ref=e216]: PLO5 มีทักษะวิเคราะห์เชิงตัวเลข เลือกใช้ชุดเครื่องมือในการพัฒนาซอฟต์แวร์ และสามารถสื่อสารโดยใช้ภาษาอังกฤษ
          - listitem [ref=e217]: PLO6 สร้างซอฟต์แวร์หรือระบบสารสนเทศที่ก้าวทันกับเทคโนโลยีที่พลิกผัน และสามารถนำไปใช้ประโยชน์เชิงพาณิชย์หรือพัฒนาสังคมได้
