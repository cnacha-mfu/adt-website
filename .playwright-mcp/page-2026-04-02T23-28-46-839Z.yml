        - paragraph [ref=e164]:
          - generic [ref=e169]: เส้นทางการเรียนรู้ (Learning Path)
        - paragraph
        - list [ref=e170]:
          - listitem [ref=e171]:
            - text: การเรียนการสอนครอบคลุมทั้งทฤษฎีและปฏิบัติในด้านวิศวกรรมคอมพิวเตอร์ เช่น การเขียนโปรแกรม การออกแบบระบบสมองกลฝังตัว (Embeded System) ระบบเครือข่ายคอมพิวเตอร์และความปลอดภัย (Computer Network and Security) และปัญญาประดิษฐ์ (AI)
            - text: The program covers both theory and practice in computer engineering, such as programming, embedded system design, computer networks and security, and artificial intelligence (AI)
          - listitem [ref=e172]:
            - text: นักศึกษามีโอกาสทำโครงงานที่เน้นการประยุกต์ใช้ความรู้ในสถานการณ์จริง
            - text: Students have the opportunity work on projects that focus on applying knowledge in real-world situations.
          - listitem [ref=e173]:
            - text: นักศึกษาสามารถเลือกเส้นทางการพัฒนาตนเองในด้านเฉพาะทาง ได้แก่ ด้านฮาร์ดแวร์และระบบฝังตัว ด้านการสื่อสารข้อมูลและโครงข่าย และด้านวิทยาการข้อมูลและปัญญาประดิษฐ์
            - text: Students have the option to choose their self-development path in specialized fields, including hardware and embedded systems, data communication and networking, and data science and AI.
        - paragraph [ref=e174]:
          - generic [ref=e179]: รูปแบบการเรียนที่ไม่เหมือนใคร (Unique Learning Experience)
        - paragraph
        - list [ref=e180]:
          - listitem [ref=e181]:
            - text: การใช้เครื่องมือและการเรียนรู้ในเทคโนโลยีที่ทันสมัย เช่น Embeded System, IoT, Network and Security, Cloud Computing, AI และ Machine Learning
            - text: The use of tools and learning in modern technologies such as Embedded Systems, IoT, Network and Security, Cloud Computing, AI, and Machine Learning.
          - listitem [ref=e182]:
            - text: สภาพแวดล้อมการเรียนที่เอื้อต่อการสร้างสรรค์นวัตกรรมด้วยการสนับสนุนจากอาจารย์ผู้เชี่ยวชาญ
            - text: A learning environment that fosters creativity and innovation, supported by expert faculty members.
        - paragraph [ref=e183]:
          - generic [ref=e188]: จุดเด่นของหลักสูตรที่คุณห้ามพลาด (Key Highlights of the Program)
        - paragraph
        - list [ref=e189]:
          - listitem [ref=e190]:
            - text: หลักสูตรออกแบบตามแนวคิด Outcome-Based Education (OBE) ที่มุ่งเน้นผลลัพธ์ที่เกิดกับผู้เรียนและความต้องการของตลาดแรงงาน
            - text: The program is designed based on the Outcome-Based Education (OBE) concept, focusing on the outcomes for students and the demands of the labor market.
          - listitem [ref=e191]:
            - text: เน้นการประยุกต์ใช้เทคโนโลยีเกิดใหม่ (Emerging Technology) ทั้งด้านซอฟต์แวร์และฮาร์ดแวร์
            - text: Emphasis on applying emerging technologies in both software and hardware.
          - listitem [ref=e192]:
            - text: โอกาสฝึกงานในบริษัทเทคโนโลยีชั้นนำทั้งในและต่างประเทศ
            - text: Opportunities for internships with leading technology companies, both locally and internationally.
          - listitem [ref=e193]: โอกาสแลกเปลี่ยนประสบการณ์การเรียนรู้ ณ มหาวิทยาลัยชั้นนำในต่างประเทศ Opportunities for exchange programs at top universities abroad.
        - paragraph [ref=e194]
        - paragraph [ref=e195]:
          - generic [ref=e200]: ใครที่เหมาะกับสาขานี้? (Is This the Right Fit for You?)
        - paragraph
        - list [ref=e201]:
          - listitem [ref=e202]: ผู้ที่ชื่นชอบการแก้ปัญหาและสร้างสรรค์นวัตกรรมใหม่ ๆ ด้วยเทคโนโลยี For those who enjoy problem-solving and creating new innovations with technology.
          - listitem [ref=e203]:
            - text: ผู้ที่มีความสนใจด้านคอมพิวเตอร์ เช่น การเขียนโปรแกรม การออกแบบระบบไม่ว่าจะเป็นระบบสมองกลฝังตัว หรือระบบเครือข่ายคอมพิวเตอร์และความปลอดภัย ด้าน IoT, Data science และ AI
            - text: For those interested in computers, such as programming, system design (whether embedded systems or computer networks and security), IoT, data science, and AI.
          - listitem [ref=e204]: ผู้ที่ต้องการทำงานในอุตสาหกรรมที่เติบโตอย่างรวดเร็ว โดยเฉพาะทางด้าน IT, AI, และ IoT For those who want to work in rapidly growing industries, especially in IT, AI, and IoT.
          - listitem [ref=e205]:
            - text: ผู้ที่ต้องการทำงานในอุตสาหกรรมที่มีความต้องการอย่างสูงในปัจจุบัน เช่น ด้าน Network Security ด้าน Embed System และด้าน Data Science
            - text: For those who want to work in industries that are in high demand today, such as network security, embedded systems, and data science.
