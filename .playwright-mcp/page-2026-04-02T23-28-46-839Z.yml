        - paragraph
        - list [ref=e144]:
          - listitem [ref=e145]: ใช้ภาษาอังกฤษในการเรียนการสอน เพิ่มโอกาศการได้งาน
          - listitem [ref=e146]: ปรับหลักสูตรที่ทันสมัย ตรงกับความต้องการของผู้ประกอบการ
          - listitem [ref=e147]: ห้องปฏิบัติการที่ทันสมัยและเพียบพร้อม
          - listitem [ref=e148]: ปลูกฝังเรื่องของการเขียนโปรแกรมในระดับที่สามารถสร้างโปรแกรมและผลิตภัณฑ์ของตัวเองได้
          - listitem [ref=e149]: ใช้การเรียนการสอนโดยใช้ปัญหาเป็นฐาน PBL (Problem Based Learning) ให้ผู้เรียนเกิดความเชี่ยวชาญและสนุกใน ด้านการปฏิบัติ
          - listitem [ref=e150]: ได้รับประสบการณ์การทำงานจริงและรายได้ระหว่างเรียน
          - listitem [ref=e151]: มีความร่วมมือกับหน่วยงานภาครัฐและเอกชนด้านไอทีที่มีชื่อเสียง
