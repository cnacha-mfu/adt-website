          - listitem [ref=e140]: สามารถศึกษาต่อในระดับปริญญาโทและปริญญาเอก ทั้งในประเทศและต่างประเทศ ในด้านวิศวกรรมคอมพิวเตอร์ หรือสาขาอื่นๆ ที่มีความใกล้เคียงกัน เช่น วิศวกรรมไฟฟ้า วิศวกรรมอิเล็กทรอนิกส์ วิศวกรรมโทรคมนาคม เป็นต้น
