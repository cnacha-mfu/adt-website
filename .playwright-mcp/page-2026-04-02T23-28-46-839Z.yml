          - strong [ref=e119]:
            - text: หลักสูตรวิศวกรรมศาสตรบัณฑิต สาขาวิชาวิศวกรรมคอมพิวเตอร์
            - text: Bachelor of Engineering Program in Computer Engineering
        - paragraph [ref=e120]:
          - text: "ชื่อปริญญา ภาษาไทย : วิศวกรรมศาสตรบัณฑิต (วิศวกรรมคอมพิวเตอร์) (วศ.บ.)"
          - text: "ภาษาอังกฤษ : Bachelor of Engineering (Computer Engineering) (B.Eng.)"
        - paragraph [ref=e121]: หลักสูตรวิศวกรรมศาสตรบัณฑิต สาขาวิชาวิศวกรรมคอมพิวเตอร์ ผลิตนักศึกษาที่มีมีองค์ความรู้และทักษะความสามารถทั้งเชิงทฤษฎีและปฏิบัติทางวิศวกรรมคอมพิวเตอร์ในระดับสากล มีความชำนาญเฉพาะทางในการออกแบบและวางแผนเกี่ยวกับการนำเทคโนโลยีใหม่ ๆ ไปประยุกต์ใช้ในการสร้างสรรค์นวัตกรรม การบำรุงรักษาทั้งทางด้านฮาร์ดแวร์และซอฟต์แวร์ของระบบคอมพิวเตอร์ แบ่งสายการเรียนรู้เป็นสามด้านตามความถนัดของผู้เรียนเพื่อตอบโจทย์อุตสาหกรรมและภาคเอกชนยุคใหม่ ได้แก่ ฮาร์ดแวร์และระบบควบคุมอัจฉริยะ (Hardware and Intelligent Control System) วิทยาการข้อมูลและปัญญาประดิษฐ์ (Data Science and Artificial Intelligence) และเครือข่ายและการสื่อสารข้อมูล (Data Communications and Networks) รวมถึงการประยุกต์ใช้ระบบทางด้านคอมพิวเตอร์ในภาคอุตสาหกรรม มีความสามารถเรียนรู้ด้วยตนเอง แสวงหาความรู้เพิ่มเติมอยู่เสมอ สามารถสร้างสรรค์ผลงานทางวิศวกรรมเพื่อเป็นผู้นำด้านเทคโนโลยี
