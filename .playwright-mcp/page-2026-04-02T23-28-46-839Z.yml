      - generic [ref=e359]:
        - heading "ปรัชญาของหลักสูตร" [level=4] [ref=e360]
        - paragraph
        - list [ref=e361]:
          - listitem [ref=e362]: วิศวกรรมคอมพิวเตอร์ เป็นศาสตร์ที่มีบทบาทสำคัญในการปฎิรูปอุตสาหกรรมเพื่อพัฒนาเศรษฐกิจและสังคมมาตั้งแต่อดีตจนกระทั่งถึงปัจจุบันและยังเป็นอีกหนึ่งศาสตร์ที่จำเป็นต่อการใช้รับมือกับภาวพลิกผันต่างๆ ที่กำลังจะเกิดขึ้นในปัจจุบันและอนาคต การคิดค้นทฤษฎีใหม่และนวัตกรรมทางวิศวกรรมคอมพิวเตอร์ ยังคงมีความจำเป็นอย่างเร่งด่วนและต้องดำเนินการอย่างต่อเนื่องผ่านการพัฒนาทรัพยากรมนุษย์ในศาสตร์นี้ หลักสูตรนี้นำทฤษฎีการสร้างความรู้ของผู้เรียน คือ ทฤษฎีคอนสตรัคติวิสต์ (Constructivist Theory) มาเป็นรากฐานสำคัญในการออกแบบและพัฒนาหลักสูตร ทำการผสมผสานแนวคิดแบบคอนสตรัคติวิสต์เชิงปัญญา (Cognitive Constructivism) และคอนสตรัคติวิสต์เชิงสังคม (Social Constructivism) เข้าด้วยกัน โดยเชื่อว่า การเรียนรู้ หรือการสร้างความรู้ เป็นกระบวนการที่เกิดขึ้นภายในของผู้เรียน โดยที่ผู้เรียนเป็นผู้สร้างความรู้ โดยการนำประสบการณ์หรือสิ่งที่พบเห็นในสิ่งแวดล้อมหรือสารสนเทศใหม่ที่ได้รับมาเชื่อมโยงกับความรู้ความเข้าใจที่มีอยู่เดิม มาสร้างเป็นความเข้าใจของตนเอง หรือ เรียกว่า โครงสร้างทางปัญญา (Cognitive Structure) และใช้สถานการณ์ที่เป็นปัญหาและปฏิสัมพันธ์ทางสังคมก่อให้เกิดความขัดแย้งทางปัญญา เพื่อให้ได้มาซึ่งกิจกรรมการไตร่ตรองเพื่อขจัดความขัดแย้งเหล่านั้น ส่งผลให้มีการสร้างโครงสร้างใหม่ทางปัญญาขึ้นมาในที่สุด การจัดการเรียนการสอนตามทฤษฎีคอนสตรัคติวิสต์ จะสนับสนุนการสร้างมากกว่าความพยายามในการถ่ายทอดความรู้ หลักสูตรนี้จึงใช้การเรียนการสอนแบบใช้ปัญหาเป็นฐาน (Problem Based Learning Pedagogy) เป็นหลักสำคัญในการจัดการเรียนการสอน โดยเน้นให้ผู้เรียนเผชิญกับสถานการณ์จริง ค้นหาแนวทางการแก้ปัญหาด้วยตนเองผ่านการสนับสนุนของผู้สอนและการปฏิสัมพันธ์กับผู้อื่น
        - paragraph
        - list [ref=e363]:
          - listitem [ref=e364]: ทั้งนี้ หลักสูตรวิศวกรรมศาสตรบัณฑิต สาขาวิชาวิศวกรรมคอมพิวเตอร์ สำนักวิชาเทคโนโลยีสารสนเทศ มหาวิทยาลัยแม่ฟ้าหลวง มุ่งเน้นผลิตบัณฑิตที่มีองค์ความรู้และทักษะความสามารถทั้งเชิงทฤษฎีและปฏิบัติทางวิศวกรรมคอมพิวเตอร์ในระดับสากล สามารถเรียนรู้ด้วยตนเอง มีความชำนาญที่หลากหลาย สามารถการออกแบบ วิจัยและพัฒนาระบบ โดยการนำเทคโนโลยีเกิดใหม่ (Emerging Technology) ทั้งทางด้านด้านฮาร์ดแวร์และระบบฝังตัว (Hardware and Embedded Systems) วิทยาการข้อมูลและปัญญาประดิษฐ์ (Data Science and Artificial Intelligence) และด้านการสื่อสารข้อมูลและโครงข่าย (Data Communications and Networks) ไปประยุกต์ใช้เพื่อแก้ปัญหาด้านวิศวกรรมคอมพิวเตอร์เพื่อตอบโจทย์ภาคอุตสาหกรรมและภาคเอกชนยุคใหม่
        - paragraph [ref=e365]
        - paragraph [ref=e366]: ความสำคัญของหลักสูตร
        - paragraph
        - list [ref=e367]:
          - listitem [ref=e368]: "หลักสูตรวิศวกรรมศาสตรบัณฑิต สาขาวิชาวิศวกรรมคอมพิวเตอร์ สำนักวิชาเทคโนโลยีสารสนเทศ มหาวิทยาลัยแม่ฟ้าหลวง ถูกพัฒนาขึ้นภายใต้กรอบของพระราชบัญญัติการอุดมศึกษา พ.ศ. 2562 และนโยบายในการพัฒนาประเทศตามยุทธศาสตร์ชาติ 20 ปี (พ.ศ. 2560-2579) ซึ่งส่งผลกระทบโดยตรงทั้งทางด้านเศรษฐกิจ สังคม และ วัฒนธรรม ทั้งนี้การพัฒนาทรัพยากรมนุษย์เพื่อตอบสนองต่อความต้องการข้างต้นจึงเป็นภาระกิจที่สำคัญเร่งด่วน ดังนั้น หลักสูตรนี้จึงเป็นการสร้างนักวิชาการและวิศวกรคอมพิวเตอร์ที่มีความรู้ ความสามารถในการวิจัยและพัฒนานวัตกรรมเพื่อเพิ่มศักยภาพในการแข่งขันของประเทศภายใต้ภาวะพลิกผันต่างๆ ของโลก เพื่อเป็นการตอบสนองความต้องการทรัพยากรมนุษย์ที่เป็นกำลังสำคัญในการขับเคลื่อนประเทศชาติต่อไปในอนาคต การจัดการศึกษาในหลักสูตรนี้ เป็นกระบวนการจัดการเรียนการสอนแบบเน้นผลลัพธ์ (Outcome Based Education: OBE) เพื่อให้นักศึกษามีจรรยาบรรณ มีความรู้และเชี่ยวชาญอย่างถ่องแท้ในเนื้อหาสาระของวิศวกรรมคอมพิวเตอร์ โดยเฉพาะการประยุกต์ใช้เทคโนโลยีเกิดใหม่ (Emerging Technology) ทั้งทางด้านฮาร์ดแวร์และระบบฝังตัว (Hardware and Embedded Systems) วิทยาการข้อมูลและปัญญาประดิษฐ์ (Data Science and Artificial Intelligence) และด้านการสื่อสารข้อมูลและโครงข่าย (Data Communications and Networks) ในการสร้างงานวิจัยและนวัตกรรมภายใต้ภาวะพลิกผันต่างๆของโลก มีทัศนคติที่เป็นบวก พร้อมสำหรับการพัฒนาตนเองและปรับตัวร่วมกับผู้อื่นภายใต้สังคมพหุวัฒนธรรมเพื่อเป็นผู้นำภายใต้ภาวะพลิกผันต่าง ๆ ได้"
        - paragraph [ref=e369]
        - paragraph [ref=e370]: "วัตถุประสงค์ของหลักสูตร (Program Education Objectives: PEOs)"
        - paragraph
        - list [ref=e371]:
          - listitem [ref=e372]: ผลิตบัณฑิตที่มีความเข้าใจหลักการที่เกี่ยวข้องกับวิศวกรรมคอมพิวเตอร์ สื่อสารกับผู้อื่นได้อย่างมีประสิทธิภาพ และทำงานร่วมกับผู้อื่นได้ด้วยความรับผิดชอบ ทั้งในฐานะผู้นำและผู้ตาม
          - listitem [ref=e373]: ผลิตบัณฑิตที่ใช้ความรู้และทักษะที่มีเพื่อการเรียนรู้อย่างต่อเนื่องในอนาคต ปรับตัวให้เข้ากับสถานการณ์ต่างๆ และการเปลี่ยนแปลงของสังคมได้ มีคุณธรรม จริยธรรม ประพฤติตนตามจรรยาบรรณวิชาชีพ
          - listitem [ref=e374]: ผลิตบัณฑิตที่มีความรู้ความสามารถด้านการออกแบบและพัฒนาระบบทางวิศวกรรมคอมพิวเตอร์ ทั้งทางด้าน ฮาร์ดแวร์ ซอฟต์แวร์ วิทยาการข้อมูลและระบบเครือข่ายได้
        - paragraph [ref=e375]
        - paragraph [ref=e376]: "ผลลัพธ์การเรียนรู้ของหลักสูตร (Program Learning Outcomes: PLOs)"
        - paragraph
        - list [ref=e377]:
          - listitem [ref=e378]: "PLO1: แสดงพฤติกรรมทางคุณธรรม จริยธรรมที่ดี เคารพกฎเกณฑ์ขององค์กรและสังคม ไม่ขัดต่อจริยธรรมและกฎหมายทางคอมพิวเตอร์"
          - listitem [ref=e379]: "PLO2: อภิปรายเชื่อมโยงหลักการ ทฤษฎี ความรู้พื้นฐานด้านวิศวกรรมคอมพิวเตอร์และเทคโนโลยีเกิดใหม่ เพื่อแก้ไขปัญหาด้านวิศวกรรมคอมพิวเตอร์ได้อย่างเหมาะสม"
          - listitem [ref=e380]: "PLO3: ออกแบบระบบด้านวิศวกรรมคอมพิวเตอร์โดยการประยุกต์ใช้ความรู้พื้นฐานด้านวิศวกรรมคอมพิวเตอร์ เทคโนโลยีเกิดใหม่และศาสตร์อื่นที่เกี่ยวข้องได้"
          - listitem [ref=e381]: "PLO4: แสดงออกถึงความสามารถในการทำงานเป็นทีมภายใต้สังคมพหุวัฒนธรรมได้"
          - listitem [ref=e382]: "PLO5: มีทักษะการวิเคราะห์เชิงตัวเลข การสื่อสารและการเลือกใช้เทคโนโลยีเกิดใหม่ ในการแก้ปัญหาทางด้านวิศวกรรมคอมพิวเตอร์ได้อย่างเหมาะสม"
          - listitem [ref=e383]: "PLO6: พัฒนาระบบเพื่อแก้ไขปัญหาทางด้านวิศวกรรมคอมพิวเตอร์จากปัญหาในภาคอุตสาหกรรมได้อย่างมีประสิทธิภาพ"
