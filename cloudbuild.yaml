# Cloud Build pipeline — build → push to Artifact Registry → deploy to Cloud Run
#
# ── One-time setup (run in Cloud Shell or local gcloud) ──────────────────────
#
#   PROJECT=webdev2025-1
#   REGION=asia-southeast1
#
#   # Enable APIs
#   gcloud services enable run.googleapis.com artifactregistry.googleapis.com \
#     cloudbuild.googleapis.com --project=$PROJECT
#
#   # Create Artifact Registry repo
#   gcloud artifacts repositories create adt-website \
#     --repository-format=docker --location=$REGION --project=$PROJECT
#
#   # Grant Cloud Build SA permission to deploy to Cloud Run
#   PROJECT_NUM=$(gcloud projects describe $PROJECT --format='value(projectNumber)')
#   CB_SA="${PROJECT_NUM}@cloudbuild.gserviceaccount.com"
#   gcloud projects add-iam-policy-binding $PROJECT \
#     --member="serviceAccount:${CB_SA}" --role=roles/run.admin
#   gcloud iam service-accounts add-iam-policy-binding \
#     "${PROJECT_NUM}-compute@developer.gserviceaccount.com" \
#     --member="serviceAccount:${CB_SA}" --role=roles/iam.serviceAccountUser
#
#   # Connect GitHub repo in Cloud Build console, then create trigger:
#   gcloud builds triggers create github \
#     --repo-name=adt-website --repo-owner=<YOUR_GITHUB_USER> \
#     --branch-pattern="^master$" --build-config=cloudbuild.yaml \
#     --project=$PROJECT
#
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-southeast1
  _REPO: adt-website
  _SERVICE: adt-website
  _TAG: latest   # triggers override this with $COMMIT_SHA

steps:
  # Build image (cache from :latest to speed up subsequent builds)
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --platform=linux/amd64
      - --cache-from=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - .

  # Push both tags
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=NODE_ENV=production

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
